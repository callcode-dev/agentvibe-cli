name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - name: Resolve publish target
        id: publish
        run: |
          name=$(node -p "require('./package.json').name")
          pkg=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME#v}"
            test "$tag" = "$pkg" || (echo "tag $tag != package.json $pkg" && exit 1)
          fi
          if npm view "$name@$pkg" version >/dev/null 2>&1; then
            echo "$name@$pkg is already published; skipping npm publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.publish.outputs.should_publish == 'true'
        run: npm publish --access public --provenance
