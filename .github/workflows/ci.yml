name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run check
      - name: Smoke test CLI
        run: node dist/index.js --help
